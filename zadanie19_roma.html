<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zadanie 19 – DIV i SPAN</title>
  <style>
    div { background-color: silver; padding: 10px; margin-bottom: 20px; }
    span { color: blue; font-size: 25mm; }
    p { color: green; font-size: 40mm; }
  </style>
</head>
<body>
  <div>
    <p>To jest pogrubienie w ramach DIV — tekst zielony na srebrnym tle.</p>
    <span>To jest tekst w SPAN — niebieski, większy.</span>
  </div>
  <div>
    <ol>
      <li><span style="color: violet;">Pierwszy przykład</span></li>
      <li><span style="color: pink;">Drugi przykład</span></li>
      <li><span style="color: lightblue;">Trzeci przykład</span></li>
    </ol>
  </div>
  <!-- Illa -->
</body>
</html>
