<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zadanie 20 – Style lokalne</title>
  <style>
    h1 { color: navy; font-size: 30pt; text-decoration: underline; }
    p { font-size: 20pt; font-family: Arial; }
    .blok1 { background-color: #FFFDD0; width: 40%; height: 100px; }
    .blok2 { background-color: magenta; width: 30%; height: 90px; }
    .blok3 { background-color: lime; width: 30%; height: 90px; }
  </style>
</head>
<body>
  <h1>Style lokalne, liniowe, linkowe</h1>
  <div class="blok1">
    <p style="color: orange;">To jest akapit w bloku 1 – tekst pomarańczowy.</p>
  </div>
  <div class="blok2">
    <p style="color: yellow;">To jest akapit w bloku 2 – tekst żółty.</p>
  </div>
  <div class="blok3">
    <p style="color: green;">To jest akapit w bloku 3 – tekst zielony.</p>
  </div>
  <!-- Illa -->
</body>
</html>
